---
layout: default
---
<main class="container post-page">
    <article class="post">
        <header class="post-header">
            <p class="post-kicker"><a href="{{ '/blog/' | relative_url }}">Back to Blog</a></p>
            <h1>{{ page.title }}</h1>
            <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>
